name: release

# Build the FluXent Gallery for Windows x86_64 + aarch64 with both MSVC and
# clang/llvm-mingw (4 binaries), and attach them to the GitHub Release on a v* tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gallery:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: msvc-x86_64,   toolchain: msvc,  plat: windows, xarch: x64 }
          - { name: msvc-aarch64,  toolchain: msvc,  plat: windows, xarch: arm64 }
          - { name: mingw-x86_64,  toolchain: mingw, plat: mingw,   xarch: x86_64 }
          - { name: mingw-aarch64, toolchain: mingw, plat: mingw,   xarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Setup llvm-mingw (clang + mingw runtime, x64 & arm64 targets)
        if: matrix.toolchain == 'mingw'
        shell: pwsh
        run: |
          $rel = Invoke-RestMethod https://api.github.com/repos/mstorsjo/llvm-mingw/releases/latest
          $asset = $rel.assets | Where-Object { $_.name -like 'llvm-mingw-*-ucrt-x86_64.zip' } | Select-Object -First 1
          Invoke-WebRequest $asset.browser_download_url -OutFile llvm-mingw.zip
          Expand-Archive llvm-mingw.zip -DestinationPath C:\ -Force
          $root = (Get-ChildItem 'C:\llvm-mingw-*' -Directory | Select-Object -First 1).FullName
          "LLVM_MINGW=$root" | Out-File -Append -Encoding ascii $env:GITHUB_ENV
          "$root\bin"        | Out-File -Append -Encoding ascii $env:GITHUB_PATH

      - name: Configure (${{ matrix.name }})
        shell: pwsh
        run: |
          if ('${{ matrix.toolchain }}' -eq 'mingw') {
            xmake f -p mingw -a ${{ matrix.xarch }} --mingw="$env:LLVM_MINGW" -m release -y
          } else {
            xmake f -p windows -a ${{ matrix.xarch }} -m release -y
          }

      - name: Build gallery
        run: xmake build fluxent_gallery

      - name: Stage artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse build -Filter fluxent_gallery.exe | Select-Object -First 1
          if (-not $exe) { throw 'fluxent_gallery.exe not found' }
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item $exe.FullName "dist/fluxent_gallery-${{ matrix.name }}.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluxent_gallery-${{ matrix.name }}
          path: dist/fluxent_gallery-${{ matrix.name }}.exe
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fluxent_gallery-${{ matrix.name }}.exe
          fail_on_unmatched_files: true
